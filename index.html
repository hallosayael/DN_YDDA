<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Debit Note Makan Siang Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --inp-h: 38px;
            --inp-fs: 14px;
            --row-even: #f8fafc;
            --row-hover: #f1f5f9;
        }

        * { box-sizing: border-box; transition: background 0.2s, border 0.2s; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .wrap {
            max-width: 1200px;
            margin: auto;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* HEADER FIX */
        header { padding: 30px 20px; background: #fff; border-bottom: 1px solid var(--border); text-align: center; }
        h1 { margin: 0; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.025em; display: flex; align-items: center; justify-content: center; gap: 12px; }

#titleExtra {
    border: none;
    border-bottom: 2px solid var(--border);
    background: transparent;
    font-weight: 800;
    color: var(--primary);
    padding: 4px 10px;
    outline: none;
    text-transform: uppercase;
    /* Update Lebar Di Sini */
    width: 100%; 
    max-width: 650px; 
    min-width: 300px;
    text-align: center;
    font-size: 1.1rem;
}

/* Tambahan agar di PC header tidak terlalu mepet */
header h1 {
    display: flex;
    flex-direction: column; /* Membuat "DEBIT NOTE" dan "INPUT JUDUL" bertumpuk jika teks panjang */
    gap: 10px;
}

@media (min-width: 768px) {
    header h1 {
        flex-direction: row; /* Kembali sejajar di layar lebar */
    }
}

        /* TOOLBAR PC FIX */
        .toolbar {
            padding: 20px 24px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-success { background: var(--success); color: white; border: none; }
        .btn-danger { color: var(--danger); }

        .basis-wrap { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        select { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); font-weight: 700; outline: none; background: #fff; cursor: pointer; }

        /* TABLE FIX */
        .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; table-layout: fixed; }
        
        th {
            background: #f8fafc;
            padding: 14px 12px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #0f172a;
            border-bottom: 2px solid var(--border);
            text-align: right;
        }

        th:first-child, td:first-child { text-align: left; padding-left: 24px; width: 320px; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: right; overflow: hidden; }

        #tbody tr:nth-child(even) { background-color: var(--row-even); }
        #tbody tr:hover { background-color: var(--row-hover); }

        input.money {
            width: 100%; height: var(--inp-h); font-size: var(--inp-fs);
            font-weight: 500; border: 1px solid var(--border);
            border-radius: 8px; padding: 0 10px; text-align: right; outline: none;
            background: #fff;
        }
        
        #tbody tr input.money { background-color: rgba(255,255,255,0.6); }
        td:first-child input.money { text-align: left; font-weight: 600; }
        input.money:focus { border-color: var(--primary); background-color: #fff !important; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        
        .row-label { background: #fdfbf7; font-weight: 600; }
        .row-tot { background: #f5f3ff; font-weight: 700; color: var(--primary); }
        .row-net { background: #eff6ff; font-weight: 800; font-size: 1.2rem; color: #1d4ed8; }
        .col-total { font-weight: 800; background: #f8fafc; color: #000; }

        /* PAYMENT AREA PC FIX */
        .payto { padding: 30px; background: #fff; border-top: 2px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .payto-input-wrap { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 8px; }
        .payto label { font-weight: 800; font-size: 0.9rem; color: #64748b; text-align: center; width: 100%; }
        .payto input { width: 100%; padding: 14px 20px; border: 2px solid var(--primary); border-radius: 12px; font-weight: 800; background: #f5f3ff; color: var(--primary-dark); outline: none; text-transform: uppercase; text-align: center; font-size: 1.1rem; }

        #info-rekening {
            width: 100%; max-width: 500px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 12px;
            font-weight: 700;
            color: #15803d;
            display: none;
            border: 1px dashed #4ade80;
            font-size: 0.95rem;
            text-align: center;
        }

        #qr-wrap { display: none; text-align: center; margin-top: 10px; }
        #qr-code { width: 160px; height: 160px; border: 6px solid white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        .more-row td { background: #fff !important; text-align: center !important; padding: 15px; font-weight: 800; font-size: 0.85rem; color: var(--primary); cursor: pointer; }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.2rem; flex-direction: column; }
            #titleExtra { width: 100%; }
            .toolbar { flex-direction: column; align-items: stretch; padding: 15px; }
            .btn-group { justify-content: center; }
            .btn { flex: 1 1 40%; justify-content: center; font-size: 0.75rem; }
            .payto { padding: 20px; }
        }

        @media print {
            .toolbar, .btn, .more-row { display: none !important; }
            .wrap { border: none; box-shadow: none; border-radius: 0; }
            input.money, #titleExtra, #payto { border: none !important; background: transparent !important; color: black !important; padding: 0 !important; }
        }
    </style>
</head>
<body>

<div class="wrap" id="capture-root">
    <header>
        <h1>DEBIT NOTE <input id="titleExtra" type="text" placeholder="JUDUL NOTA" /></h1>
    </header>

    <div class="toolbar">
        <div class="btn-group">
            <button class="btn btn-primary" id="addRow"><b>+</b> Item</button>
            <button class="btn btn-primary" id="addPerson"><b>+</b> Nama</button>
            <button class="btn btn-success" id="printBtn">🖨️ PDF / Print</button>
            <button class="btn btn-success" id="jpgBtn">📸 JPG</button>
            <button class="btn btn-danger" id="clearAll">🧹 Reset</button>
        </div>
        <div class="basis-wrap">
            Basis Diskon: 
            <select id="basis">
                <option value="SUBTOTAL" selected>SUBTOTAL</option>
                <option value="TOTAL">TOTAL</option>
            </select>
        </div>
    </div>

    <div class="table-wrap">
        <table id="tbl">
            <thead>
                <tr id="hdr">
                    <th>Menu Item</th>
                    <th class="col-total" style="width: 120px;">Total</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
            <tfoot>
                <tr class="row-label" id="rSub"><td>SUBTOTAL MENU</td></tr>
                <tr class="row-label" id="rOng"><td>BIAYA ONGKIR</td></tr>
                <tr class="row-label" id="rLain"><td>BIAYA LAIN-LAIN</td></tr>
                <tr class="row-tot"   id="rTot"><td>TOTAL KESELURUHAN</td></tr>
                <tr class="row-label" id="rPct"><td>PROPORSIONAL (%)</td></tr>
                <tr class="row-label" id="rDisc"><td>POTONGAN DISKON</td></tr>
                <tr class="row-net"   id="rNet"><td>NET TOTAL BAYAR</td></tr>
            </tfoot>
        </table>
    </div>

    <div class="payto">
        <div class="payto-input-wrap">
            <label for="payto">INFO PEMBAYARAN / BAYAR KE:</label>
            <input type="text" id="payto" placeholder="KETIK NAMA PENERIMA">
        </div>
        <div id="info-rekening"></div>
        <div id="qr-wrap">
            <img id="qr-code" src="" alt="QR Pay" crossorigin="anonymous">
            <p style="font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 600;">Scan QR untuk copy nomor rekening</p>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const dbRekening = {
    "SARAH": "BCA 8820611862 a/n SARAH AMALIAWATI",
    "WISI": "BCA 7615382035 a/n WISI SEFTIANI",
    "ICHA": "BCA 7615042790 a/n LISA SUPRAPTO",
    "SANTI": "BCA 8680784699 a/n SANTI MEILIANA",
    "MOLI": "BCA 6890169536 a/n MOLIANA"
};

const fmtID = new Intl.NumberFormat('id-ID');
const fmt = n => fmtID.format(Math.round(n));
const cleanNumber = v => {
    const s = (v ?? '').toString().replace(/[^\d\-]/g,'');
    if (!s || s === '-' || s === '--') return 0;
    return parseInt(s,10) || 0;
};

let names = ["ICHA","WISI","SARAH","MOLI","SANTI","ANGEL"];
const tbody = document.getElementById('tbody');
let visibleRows = 5;
let moreRowEl = null;
let autoExpandOnAdd = true;

function forceCaps(el) { if(el) el.value = el.value.toUpperCase(); }

const paytoInput = document.getElementById('payto');
const infoRek = document.getElementById('info-rekening');
const qrWrap = document.getElementById('qr-wrap');
const qrImg = document.getElementById('qr-code');

paytoInput.addEventListener('input', function(e) {
    forceCaps(e.target);
    const inputName = e.target.value.trim().toUpperCase();
    if (dbRekening[inputName]) {
        const detail = dbRekening[inputName];
        infoRek.textContent = "Silahkan transfer ke rek: " + detail;
        infoRek.style.display = 'block';
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(detail)}`;
        qrWrap.style.display = 'block';
    } else if (inputName.length > 5) {
        infoRek.style.display = 'none';
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(inputName)}`;
        qrWrap.style.display = 'block';
    } else {
        infoRek.style.display = 'none';
        qrWrap.style.display = 'none';
    }
});

function ensureMoreRow(){
    if (moreRowEl && moreRowEl.isConnected) return moreRowEl;
    moreRowEl = document.createElement('tr');
    moreRowEl.className = 'more-row';
    const td = document.createElement('td');
    td.colSpan = names.length + 2;
    td.innerHTML = 'TAMPILKAN LEBIH BANYAK ▾';
    moreRowEl.appendChild(td);
    moreRowEl.addEventListener('click', toggleMoreRows);
    return moreRowEl;
}

function applyRowVisibility(){
    const rows = [...tbody.rows].filter(tr => !tr.classList.contains('more-row'));
    rows.forEach((tr, i) => { tr.style.display = (i < visibleRows) ? '' : 'none'; });
    const mr = ensureMoreRow();
    mr.firstElementChild.colSpan = names.length + 2;
    if (rows.length > 5){
        const anchor = rows[Math.min(visibleRows, rows.length) - 1];
        if (anchor) tbody.insertBefore(mr, anchor.nextSibling);
        mr.style.display = '';
    } else mr.style.display = 'none';
}

function toggleMoreRows(){
    const rows = [...tbody.rows].filter(tr => !tr.classList.contains('more-row'));
    visibleRows = (visibleRows >= rows.length) ? 5 : visibleRows + 5;
    applyRowVisibility();
}

function rebuildHeader(){
    document.getElementById('hdr').innerHTML = '<th>MENU ITEM</th>' + names.map(n=>`<th>${n}</th>`).join('') + '<th class="col-total" style="width:120px;">TOTAL</th>';
    hookHeaderRename();
}

function rebuildFooter(){
    const rows = [['rSub', false], ['rOng', true], ['rLain', true], ['rTot', false], ['rPct', false], ['rDisc', true], ['rNet', false]];
    rows.forEach(([id,withInp])=>{
        const tr = document.getElementById(id);
        tr.querySelectorAll('td:not(:first-child)').forEach(td=>td.remove());
        names.forEach((_,i)=>{
            const td = document.createElement('td'); td.id = `${id}_${i}`; tr.appendChild(td);
        });
        const tdTot = document.createElement('td'); tdTot.className='col-total';
        if(withInp){
            const inp = document.createElement('input');
            inp.type = 'text'; inp.className='money'; inp.placeholder='0'; inp.id = `${id}_total`;
            inp.addEventListener('input', e => { e.target.dataset.value = String(cleanNumber(e.target.value)); recalc(); });
            tdTot.appendChild(inp);
        } else tdTot.id = `${id}_total`;
        tr.appendChild(tdTot);
    });
}

function addRow(label=''){
    const tr = document.createElement('tr');
    const first = document.createElement('td');
    const nameIn = document.createElement('input');
    nameIn.type='text'; nameIn.className='money'; nameIn.placeholder='NAMA MENU';
    nameIn.style.textAlign='left'; nameIn.value=label;
    nameIn.addEventListener('input', e => { forceCaps(e.target); });
    first.appendChild(nameIn); tr.appendChild(first);
    names.forEach(()=>{
        const td = document.createElement('td');
        const inp = document.createElement('input');
        inp.type='text'; inp.className='money'; inp.placeholder='0';
        inp.addEventListener('input', e => { e.target.dataset.value = String(cleanNumber(e.target.value)); recalc(); });
        td.appendChild(inp); tr.appendChild(td);
    });
    const total = document.createElement('td'); total.className='col-total'; total.textContent='0'; tr.appendChild(total);
    tbody.appendChild(tr);

    if(autoExpandOnAdd) {
        const totalRows = [...tbody.rows].filter(r => !r.classList.contains('more-row')).length;
        visibleRows = Math.max(visibleRows, totalRows);
        applyRowVisibility();
    }
}

function recalc(){
    const per = new Array(names.length).fill(0);
    [...tbody.rows].forEach(tr=>{
        if (tr.classList.contains('more-row')) return;
        const inputs = [...tr.querySelectorAll('td input.money')].slice(1);
        const vals = inputs.map(i => cleanNumber(i.value || i.dataset.value));
        const rowTot = vals.reduce((a,b)=>a+b,0);
        tr.lastElementChild.textContent = fmt(rowTot);
        vals.forEach((v,i)=> per[i]+=v);
    });

    const gSub = per.reduce((a,b)=>a+b,0);
    per.forEach((v,i)=> (document.getElementById(`rSub_${i}`).textContent = fmt(v)));
    document.getElementById('rSub_total').textContent = fmt(gSub);

    const activeIdx = per.map((v,i)=> v>0?i:-1).filter(i=>i>=0);
    const nAct = activeIdx.length || 1;

    const ongTot = cleanNumber(document.getElementById('rOng_total').value);
    const lainTot = cleanNumber(document.getElementById('rLain_total').value);
    const discTot = cleanNumber(document.getElementById('rDisc_total').value);

    const splitEven = total => {
        const arr = new Array(names.length).fill(0);
        if(total===0) return arr;
        const base = Math.floor(total / nAct);
        let rem = total - base*nAct;
        activeIdx.forEach(i=> arr[i]=base);
        for(let k=0;k<rem;k++) arr[activeIdx[k % nAct]]++;
        return arr;
    };

    const ongArr = splitEven(ongTot);
    const lainArr = splitEven(lainTot);
    ongArr.forEach((v,i)=> (document.getElementById(`rOng_${i}`).textContent = fmt(v)));
    lainArr.forEach((v,i)=> (document.getElementById(`rLain_${i}`).textContent = fmt(v)));

    const total = per.map((v,i)=> v + ongArr[i] + lainArr[i]);
    const gTot = total.reduce((a,b)=>a+b,0);
    total.forEach((v,i)=> (document.getElementById(`rTot_${i}`).textContent = fmt(v)));
    document.getElementById('rTot_total').textContent = fmt(gTot);

    const basis = document.getElementById('basis').value;
    const arr = (basis==='TOTAL') ? total : per;
    const baseSum = arr.reduce((a,b)=>a+b,0);
    const pct = baseSum > 0 ? arr.map(v => v/baseSum) : new Array(names.length).fill(0);
    pct.forEach((p,i)=> (document.getElementById(`rPct_${i}`).textContent = (p*100).toFixed(2)+'%'));

    let discArr = pct.map(p => Math.floor(discTot * p));
    discArr.forEach((v,i)=> (document.getElementById(`rDisc_${i}`).textContent = fmt(v)));

    const net = total.map((v,i)=> Math.max(0, v - discArr[i]));
    net.forEach((v,i)=> (document.getElementById(`rNet_${i}`).textContent = fmt(v)));
    document.getElementById('rNet_total').textContent = fmt(net.reduce((a,b)=>a+b,0));
}

function addPerson(){
    const nm = prompt('NAMA ORANG BARU?'); if(!nm) return;
    names.push(nm.toUpperCase());
    rebuildHeader(); rebuildFooter();
    [...tbody.rows].forEach(tr=>{
        if (tr.classList.contains('more-row')) return;
        const td = document.createElement('td');
        const inp= document.createElement('input');
        inp.type='text'; inp.className='money'; inp.placeholder='0';
        inp.addEventListener('input', e => { e.target.dataset.value = String(cleanNumber(e.target.value)); recalc(); });
        td.appendChild(inp);
        tr.insertBefore(td, tr.lastElementChild);
    });
    applyRowVisibility(); recalc();
}

function hookHeaderRename(){
    const ths = [...document.getElementById('hdr').cells];
    ths.forEach((th, idx) => {
        if (idx === 0 || idx === ths.length - 1) return;
        th.onclick = () => {
            const nm = prompt('GANTI NAMA:', names[idx-1]);
            if (nm) { names[idx-1] = nm.toUpperCase(); rebuildHeader(); recalc(); }
        };
    });
}

document.getElementById('addRow').onclick = () => addRow();
document.getElementById('addPerson').onclick = addPerson;
document.getElementById('clearAll').onclick = () => { document.querySelectorAll('input.money').forEach(i=>i.value=''); recalc(); };
document.getElementById('basis').onchange = recalc;
document.getElementById('printBtn').onclick = () => window.print();

document.getElementById('jpgBtn').onclick = async () => {
    // Memastikan teks sudah caps sebelum capture
    forceCaps(document.getElementById('titleExtra'));
    forceCaps(document.getElementById('payto'));

    const captureArea = document.getElementById('capture-root');

    // Tambahkan opsi useCORS dan allowTaint
    const canvas = await html2canvas(captureArea, { 
        scale: 2,
        useCORS: true, // PENTING: Mengizinkan capture gambar dari URL luar
        allowTaint: false,
        logging: true // Bisa bantu cek error di console browser
    });

    const a = document.createElement('a');
    a.href = canvas.toDataURL("image/jpeg", 0.9);
    a.download = `DebitNote_${Date.now()}.jpg`;
    a.click();
};

function boot(){
    rebuildHeader(); rebuildFooter();
    autoExpandOnAdd = false;
    for(let i=0; i<5; i++) addRow();
    autoExpandOnAdd = true;
    applyRowVisibility(); recalc();
}
boot();
</script>
</body>
</html>
