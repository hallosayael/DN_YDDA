<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Debit Note Makan Siang Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --inp-h: 40px;
            --inp-fs: 14px;
        }

        * { box-sizing: border-box; transition: background 0.2s, border 0.2s, box-shadow 0.2s; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
        }

        .wrap {
            max-width: 1150px;
            margin: auto;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        header { padding: 24px; background: #fff; border-bottom: 1px solid var(--border); text-align: center; }
        h1 { margin: 0; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.025em; display: flex; align-items: center; justify-content: center; gap: 12px; }

        #titleExtra {
            border: none;
            border-bottom: 2px solid var(--border);
            background: transparent;
            font-weight: 700;
            color: var(--primary);
            padding: 2px 8px;
            outline: none;
            text-transform: uppercase;
            width: 250px;
        }

        .toolbar {
            padding: 16px 24px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background: #f1f5f9; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-success { background: var(--success); color: white; border: none; }
        .btn-danger { color: var(--danger); }

        select { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); font-weight: 600; outline: none; }

        .table-wrap { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        
        th {
            background: #f8fafc;
            padding: 14px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            text-align: right;
        }

        th:first-child { text-align: left; padding-left: 24px; }
        td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: right; }
        td:first-child { padding-left: 24px; text-align: left; }

        input.money {
            width: 100%; height: var(--inp-h); font-size: var(--inp-fs);
            font-weight: 500; border: 1px solid var(--border);
            border-radius: 8px; padding: 0 10px; text-align: right; outline: none;
        }

        input.money:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        
        .row-label { background: #fdfbf7; font-weight: 600; }
        .row-tot { background: #f5f3ff; font-weight: 700; color: var(--primary); }
        .row-net { background: #eff6ff; font-weight: 800; font-size: 1.1rem; color: #1d4ed8; }
        .col-total { font-weight: 700; background: #f8fafc; }

        .payto { padding: 24px; background: #fff; border-top: 2px solid var(--border); display: flex; align-items: center; gap: 16px; }
        .payto label { font-weight: 700; font-size: 0.95rem; }
        .payto input { flex: 1; padding: 14px 18px; border: 2px solid var(--primary); border-radius: 12px; font-weight: 700; background: #f5f3ff; color: var(--primary-dark); outline: none; text-transform: uppercase; }

        .more-row td { background: #fff; text-align: center !important; padding: 12px; font-weight: 700; font-size: 0.8rem; color: var(--primary); cursor: pointer; border-bottom: 1px solid var(--border); }

        .note { padding: 16px 24px; font-size: 0.75rem; color: var(--text-muted); background: #fff; font-style: italic; }

        @media print {
            .toolbar, .btn, .more-row, .note { display: none !important; }
            .wrap { border: none; box-shadow: none; }
            input.money, #titleExtra, #payto { border: none !important; background: transparent !important; }
        }
    </style>
</head>
<body>

<div class="wrap" id="capture-root">
    <header>
        <h1>DEBIT NOTE <input id="titleExtra" type="text" placeholder="KLIK UNTUK ISI JUDUL" /></h1>
    </header>

    <div class="toolbar">
        <div class="btn-group">
            <button class="btn btn-primary" id="addRow">+ Menu</button>
            <button class="btn btn-primary" id="addPerson">+ Nama</button>
            <button class="btn btn-success" id="printBtn">🖨️ PDF / Print</button>
            <button class="btn btn-success" id="jpgBtn">📸 Simpan JPG</button>
            <button class="btn btn-danger" id="clearAll">🧹 Reset</button>
        </div>
        <div style="font-size: 0.875rem; font-weight: 600;">
            Basis Diskon: 
            <select id="basis"><option>TOTAL</option><option>SUBTOTAL</option></select>
        </div>
    </div>

    <div class="table-wrap">
        <table id="tbl">
            <thead>
                <tr id="hdr">
                    <th>Menu Item</th>
                    <th class="col-total">Total</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
            <tfoot>
                <tr class="row-label" id="rSub"><td>SUBTOTAL MENU</td></tr>
                <tr class="row-label" id="rOng"><td>BIAYA ONGKIR</td></tr>
                <tr class="row-label" id="rLain"><td>BIAYA LAIN-LAIN</td></tr>
                <tr class="row-tot"   id="rTot"><td>TOTAL KESELURUHAN</td></tr>
                <tr class="row-label" id="rPct"><td>PROPORSIONAL (%)</td></tr>
                <tr class="row-label" id="rDisc"><td>POTONGAN DISKON</td></tr>
                <tr class="row-net"   id="rNet"><td>NET TOTAL BAYAR</td></tr>
            </tfoot>
        </table>
    </div>

    <div class="note">* Isikan nominal tanpa titik. Data otomatis disimpan saat Anda mengetik.</div>

    <div class="payto">
        <label for="payto">BAYAR KE:</label>
        <input type="text" id="payto" placeholder="NAMA / REKENING / GOPAY / OVO">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const fmtID = new Intl.NumberFormat('id-ID');
const fmt = n => fmtID.format(Math.round(n));
const cleanNumber = v => {
    const s = (v ?? '').toString().replace(/[^\d\-]/g,'');
    if (!s || s === '-' || s === '--') return 0;
    return parseInt(s,10) || 0;
};

let names = ["ICHA","WISI","SARAH","MOLI","SANTI","ANGEL"];
const tbody = document.getElementById('tbody');
let visibleRows = 5;
let moreRowEl = null;
let autoExpandOnAdd = true;

function ensureMoreRow(){
    if (moreRowEl && moreRowEl.isConnected) return moreRowEl;
    moreRowEl = document.createElement('tr');
    moreRowEl.className = 'more-row';
    const td = document.createElement('td');
    td.colSpan = names.length + 2;
    td.textContent = 'SHOW MORE ▾';
    moreRowEl.appendChild(td);
    moreRowEl.addEventListener('click', toggleMoreRows);
    return moreRowEl;
}

function updateMoreRowLabel(totalRows){
    const td = moreRowEl?.firstElementChild;
    if (!td) return;
    if (visibleRows >= totalRows) td.textContent = 'ROLL BACK ▴';
    else td.textContent = `SHOW ${Math.min(5, totalRows - visibleRows)} MORE ▾`;
}

function applyRowVisibility(){
    const rows = [...tbody.rows].filter(tr => !tr.classList.contains('more-row'));
    const total = rows.length;
    rows.forEach((tr, i) => { tr.style.display = (i < visibleRows) ? '' : 'none'; });
    const mr = ensureMoreRow();
    mr.firstElementChild.colSpan = names.length + 2;
    if (total > 5){
        const anchorIdx = Math.min(visibleRows, total) - 1;
        const anchor = rows[anchorIdx];
        if (anchor) tbody.insertBefore(mr, anchor.nextSibling);
        mr.style.display = '';
        updateMoreRowLabel(total);
    } else {
        mr.style.display = 'none';
    }
}

function toggleMoreRows(){
    const rows = [...tbody.rows].filter(tr => !tr.classList.contains('more-row'));
    if (visibleRows >= rows.length) visibleRows = 5;
    else visibleRows += 5;
    applyRowVisibility();
}

function rebuildHeader(){
    document.getElementById('hdr').innerHTML = '<th>MENU ITEM</th>' + names.map(n=>`<th>${n}</th>`).join('') + '<th class="col-total">TOTAL</th>';
    hookHeaderRename();
}

function rebuildFooter(){
    const rows = [['rSub', false], ['rOng', true], ['rLain', true], ['rTot', false], ['rPct', false], ['rDisc', true], ['rNet', false]];
    rows.forEach(([id,withInp])=>{
        const tr = document.getElementById(id);
        tr.querySelectorAll('td:not(:first-child)').forEach(td=>td.remove());
        names.forEach((_,i)=>{
            const td = document.createElement('td'); td.id = `${id}_${i}`; tr.appendChild(td);
        });
        const tdTot = document.createElement('td'); tdTot.className='col-total';
        if(withInp){
            const inp = document.createElement('input');
            inp.type = 'text'; inp.className='money'; inp.placeholder='0'; inp.id = `${id}_total`;
            const handle = e => { e.target.dataset.value = String(cleanNumber(e.target.value)); recalc(); };
            inp.addEventListener('input', handle);
            tdTot.appendChild(inp);
        } else tdTot.id = `${id}_total`;
        tr.appendChild(tdTot);
    });
}

function addRow(label=''){
    const tr = document.createElement('tr');
    const first = document.createElement('td');
    const nameIn = document.createElement('input');
    nameIn.type='text'; nameIn.className='money'; nameIn.placeholder='Nama menu';
    nameIn.style.textAlign='left'; nameIn.value=label;
    nameIn.addEventListener('input', e => { e.target.value = e.target.value.toUpperCase(); });
    first.appendChild(nameIn); tr.appendChild(first);
    names.forEach(()=>{
        const td = document.createElement('td');
        const inp = document.createElement('input');
        inp.type='text'; inp.className='money'; inp.placeholder='0';
        inp.addEventListener('input', e => { e.target.dataset.value = String(cleanNumber(e.target.value)); recalc(); });
        td.appendChild(inp); tr.appendChild(td);
    });
    const total = document.createElement('td'); total.className='col-total'; total.textContent='0'; tr.appendChild(total);
    tbody.appendChild(tr);

    if(autoExpandOnAdd) {
        const totalRows = [...tbody.rows].filter(r => !r.classList.contains('more-row')).length;
        visibleRows = Math.min(totalRows, visibleRows + 1);
        applyRowVisibility();
    }
}

function addPerson(){
    const nm = prompt('Nama orang baru?'); if(!nm) return;
    names.push(nm.toUpperCase());
    rebuildHeader(); rebuildFooter();
    [...tbody.rows].forEach(tr=>{
        if (tr.classList.contains('more-row')) return;
        const td = document.createElement('td');
        const inp= document.createElement('input');
        inp.type='text'; inp.className='money'; inp.placeholder='0';
        inp.addEventListener('input', e => { e.target.dataset.value = String(cleanNumber(e.target.value)); recalc(); });
        td.appendChild(inp);
        tr.insertBefore(td, tr.lastElementChild);
    });
    applyRowVisibility(); recalc();
}

function recalc(){
    const per = new Array(names.length).fill(0);
    [...tbody.rows].forEach(tr=>{
        if (tr.classList.contains('more-row')) return;
        const inputs = [...tr.querySelectorAll('td input.money')].slice(1);
        const vals = inputs.map(i => cleanNumber(i.value || i.dataset.value));
        const rowTot = vals.reduce((a,b)=>a+b,0);
        tr.lastElementChild.textContent = fmt(rowTot);
        vals.forEach((v,i)=> per[i]+=v);
    });

    const gSub = per.reduce((a,b)=>a+b,0);
    per.forEach((v,i)=> (document.getElementById(`rSub_${i}`).textContent = fmt(v)));
    document.getElementById('rSub_total').textContent = fmt(gSub);

    const activeIdx = per.map((v,i)=> v>0?i:-1).filter(i=>i>=0);
    const nAct = activeIdx.length || 1;

    const ongTot = cleanNumber(document.getElementById('rOng_total').value);
    const lainTot = cleanNumber(document.getElementById('rLain_total').value);
    const discTot = cleanNumber(document.getElementById('rDisc_total').value);

    const splitEven = total => {
        const arr = new Array(names.length).fill(0);
        if(total===0) return arr;
        const base = Math.floor(total / nAct);
        let rem = total - base*nAct;
        activeIdx.forEach(i=> arr[i]=base);
        for(let k=0;k<rem;k++) arr[activeIdx[k % nAct]]++;
        return arr;
    };

    const ongArr = splitEven(ongTot);
    const lainArr = splitEven(lainTot);
    ongArr.forEach((v,i)=> (document.getElementById(`rOng_${i}`).textContent = fmt(v)));
    lainArr.forEach((v,i)=> (document.getElementById(`rLain_${i}`).textContent = fmt(v)));

    const total = per.map((v,i)=> v + ongArr[i] + lainArr[i]);
    const gTot = total.reduce((a,b)=>a+b,0);
    total.forEach((v,i)=> (document.getElementById(`rTot_${i}`).textContent = fmt(v)));
    document.getElementById('rTot_total').textContent = fmt(gTot);

    const basis = document.getElementById('basis').value;
    const arr = (basis==='TOTAL') ? total : per;
    const baseSum = arr.reduce((a,b)=>a+b,0);
    const pct = baseSum > 0 ? arr.map(v => v/baseSum) : new Array(names.length).fill(0);
    pct.forEach((p,i)=> (document.getElementById(`rPct_${i}`).textContent = (p*100).toFixed(2)+'%'));

    let discArr = pct.map(p => Math.floor(discTot * p));
    discArr.forEach((v,i)=> (document.getElementById(`rDisc_${i}`).textContent = fmt(v)));

    const net = total.map((v,i)=> Math.max(0, v - discArr[i]));
    net.forEach((v,i)=> (document.getElementById(`rNet_${i}`).textContent = fmt(v)));
    document.getElementById('rNet_total').textContent = fmt(net.reduce((a,b)=>a+b,0));
}

function hookHeaderRename(){
    const ths = [...document.getElementById('hdr').cells];
    ths.forEach((th, idx) => {
        if (idx === 0 || idx === ths.length - 1) return;
        th.onclick = () => {
            const nm = prompt('Ganti nama:', names[idx-1]);
            if (nm) { names[idx-1] = nm.toUpperCase(); rebuildHeader(); renderTableContent(); }
        };
    });
}

async function captureJPG() {
    document.body.classList.add('capturing');
    const canvas = await html2canvas(document.getElementById('capture-root'), { scale: 2 });
    const a = document.createElement('a');
    a.href = canvas.toDataURL("image/jpeg", 0.9);
    a.download = `DebitNote_${Date.now()}.jpg`;
    a.click();
    document.body.classList.remove('capturing');
}

document.getElementById('addRow').onclick = () => addRow();
document.getElementById('addPerson').onclick = addPerson;
document.getElementById('clearAll').onclick = () => { document.querySelectorAll('input.money').forEach(i=>i.value=''); recalc(); };
document.getElementById('printBtn').onclick = () => window.print();
document.getElementById('jpgBtn').onclick = captureJPG;
document.getElementById('basis').onchange = recalc;

function boot(){
    rebuildHeader(); rebuildFooter();
    autoExpandOnAdd = false;
    for(let i=0; i<5; i++) addRow(); // 5 Baris Default
    autoExpandOnAdd = true;
    applyRowVisibility();
}

boot();
</script>
</body>
</html>
